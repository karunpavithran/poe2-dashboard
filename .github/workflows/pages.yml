name: Pages

# Publishes docs/ to GitHub Pages so the architecture diagram is a live,
# shareable URL: https://karunpavithran.github.io/poe2-dashboard/
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
    # Only redeploy when the published content (or this workflow) changes.
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; let an in-flight deploy finish rather than cancel
# it (a half-applied Pages deploy is worse than a slightly stale one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
